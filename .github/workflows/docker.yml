name: Docker CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 🔥 STEP 1 — Checkout code (VERY IMPORTANT)
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Verify files
      - name: List files
        run: ls -la

      # 🔥 NEW STEP — Build Docker Image
      - name: Build Docker Image
        run: docker build -t taskmanager:ci .

      # Just for confirmation
      - name: Print Hello
        run: echo "Docker build completed 🚀"
