name: Docker CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Build Docker Image
      - name: Build Docker Image
        run: docker build -t taskmanager:ci ./taskmanager

      # 🔥 LOGIN TO DOCKER HUB
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔥 TAG IMAGE FOR DOCKER HUB
      - name: Tag Image
        run: docker tag taskmanager:ci ${{ secrets.DOCKER_USERNAME }}/taskmanager:latest

      # 🔥 PUSH IMAGE
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager:latest
